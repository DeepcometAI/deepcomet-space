<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="g1" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1b2a6b"/>
      <stop offset="45%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#g1)"/>

  <!-- simple starfield -->
  <g fill="#ffffff" opacity="0.9">
    <circle cx="140" cy="140" r="1.5"/>
    <circle cx="420" cy="220" r="1.2"/>
    <circle cx="710" cy="120" r="1.1"/>
    <circle cx="980" cy="190" r="1.4"/>
    <circle cx="1260" cy="140" r="1.1"/>
    <circle cx="1520" cy="260" r="1.3"/>
    <circle cx="1740" cy="160" r="1.2"/>
    <circle cx="260" cy="520" r="1.2"/>
    <circle cx="560" cy="460" r="1.1"/>
    <circle cx="840" cy="600" r="1.3"/>
    <circle cx="1160" cy="520" r="1.1"/>
    <circle cx="1460" cy="560" r="1.2"/>
    <circle cx="1720" cy="640" r="1.1"/>
    <circle cx="220" cy="860" r="1.3"/>
    <circle cx="520" cy="780" r="1.1"/>
    <circle cx="880" cy="900" r="1.2"/>
    <circle cx="1240" cy="820" r="1.3"/>
    <circle cx="1540" cy="880" r="1.1"/>
    <circle cx="1780" cy="820" r="1.2"/>
  </g>

  <!-- soft nebula blobs -->
  <g filter="url(#blur)" opacity="0.35">
    <circle cx="520" cy="340" r="180" fill="#7c3aed"/>
    <circle cx="1120" cy="420" r="220" fill="#22d3ee"/>
    <circle cx="1480" cy="720" r="240" fill="#3b82f6"/>
  </g>
</svg>
